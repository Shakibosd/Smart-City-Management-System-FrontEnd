<!DOCTYPE html>
<html lang="en">

<head>
    <!-- meta tag -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- my web logo -->
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- my web title -->
    <title>Auth Home</title>
    <!-- boxines icon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- swiper -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
</head>

<body>
    <header>
        <section>
            <div id="navbar"></div>
            <script src="./js/navbar.js"></script>
        </section>
    </header>

    <main>
        <!-- Swiper -->
        <style>
            .swiper {
                width: 100%;
                height: 500px;
            }

            .swiper-slide {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100%;
            }

            .swiper-slide img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        </style>
        <section>
            <div class="container" style="padding-top: 150px;">
                <div class="swiper" style="border-radius: 15px;">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="./images/city1.png" alt=""></div>
                        <div class="swiper-slide"><img src="./images/city2.png" alt=""></div>
                        <div class="swiper-slide"><img src="./images/city3.png" alt=""></div>
                    </div>
                    <div class="swiper-pagination"></div>
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
            </div>
        </section>
        <br>
        <section>
            <h1 class="text-center text-light">Google Map</h1>
            <br>
            <div class="container">
                <div id="map"></div>
                <p id="directions"></p>
            </div>
        </section>
        <br>
        <section>
            <h1 class="text-center text-light">Lorem, ipsum dolor.</h1>
            <br>
            <div class="container"> 
                <video src="./images/videoplayback.mp4" controls class="card bg-dark text-light" style="width: 100%; height: 400px; border-radius: 15px;"></video>
            </div>
        </section>
    </main>
    <br>
    <!-- footer -->
    <footer>
        <div id="footer"></div>
        <script src="./js/footer.js"></script>
    </footer>

    <!-- auth js -->
    <script src="./js/auth.js"></script>

    <!-- app js -->
    <script src="./js/app.js"></script>

    <!-- app js -->
    <script src="./js/auth_home.js"></script>

    <!-- bootstrap script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- map api -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD6m5uTwrOIRKuol_llToK2VWQ-camRg8o&callback=initMap"
        async defer></script>

    <!-- swiper -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
</body>

</html>
