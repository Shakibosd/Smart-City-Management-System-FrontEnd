<!DOCTYPE html>
<html lang="en">

<head>
    <!-- meta tag -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- my web logo -->
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">
    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- my web title -->
    <title>Login Page</title>
    <!-- boxines icon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <header>
        <section>
            <div id="navbar"></div>
            <script src="./js/navbar.js"></script>
        </section>
    </header>

    <main>
        <section>
            <div class="top">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-md-6">
                            <div class="card mt-5 bg-dark">
                                <div class="card-body">
                                    <h3 class="text-center text-light">Log In To Smart City Management</h3>
                                    <br>
                                    <form class="row g-4">
                                        <div class="form-group">
                                            <input type="password" class="form-control" id="password"
                                                placeholder="Please Enter Your Password" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control" id="confirm_password"
                                                placeholder="Please Enter Your Confirm Password" required>
                                        </div>
                                        <br>
                                        <button type="submit" class="gradient-btn w-100">Login</button>
                                    </form>
                                </div>
                                <div class="text-center text-light">
                                    <p><a class="none" href=""><b>Forgotten Password?</b></a> &nbsp;&nbsp; <a class="none" href="./signup.html"><b>· Sign Up For Smart
                                                City</b></a></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <br>
        <br>
    </main>

    <!-- footer -->
    <footer>
        <div id="footer"></div>
        <script src="./js/footer.js"></script>
    </footer>

    <!-- bootstrap script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
